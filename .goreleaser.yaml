version: 2

project_name: go-mcp-servers

before:
  hooks:
    - go work sync

builds:
  - id: filesystem
    main: ./servers/filesystem
    binary: mcp-filesystem
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: postgres
    main: ./servers/postgres
    binary: mcp-postgres
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: shell
    main: ./servers/shell
    binary: mcp-shell
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: redis
    main: ./servers/redis
    binary: mcp-redis
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: http
    main: ./servers/http
    binary: mcp-http
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: homeassistant
    main: ./servers/homeassistant
    binary: mcp-homeassistant
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "go-mcp-servers_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE
      - README.md
      - servers/*/README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: dimasd-angga
    name: go-mcp-servers
